<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendly Challenge — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }
    .tagline {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 2rem;
    }
    .links-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 1rem;
    }
    .doc-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      border: 1px solid #e8ecf0;
      text-decoration: none;
      color: #1a1a2e;
      margin-bottom: 0.75rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .doc-link:hover { background: #f5f7fa; border-color: #c8d0db; }
    .doc-link:last-child { margin-bottom: 0; }
    .doc-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .doc-text { text-align: left; }
    .doc-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }
    .doc-desc {
      font-size: 0.8rem;
      color: #888;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #bbb;
    }
    .footer a { color: #888; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏆</div>
    <h1>Friendly Challenge</h1>
    <p class="tagline">Operated by Toil, LLC</p>
    <hr class="divider">
    <p class="links-label">Legal Documents</p>
    <a class="doc-link" href="privacy.html">
      <span class="doc-icon">🔒</span>
      <span class="doc-text">
        <span class="doc-title">Privacy Policy</span>
        <span class="doc-desc">How we collect, use, and protect your information</span>
      </span>
    </a>
    <a class="doc-link" href="terms.html">
      <span class="doc-icon">📄</span>
      <span class="doc-text">
        <span class="doc-title">Terms of Service</span>
        <span class="doc-desc">Rules and agreements governing your use of the app</span>
      </span>
    </a>
    <p class="footer">
      Questions? <a href="mailto:friendlychallengeteam@gmail.com">friendlychallengeteam@gmail.com</a>
    </p>
  </div>
</body>
</html>
